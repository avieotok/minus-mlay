<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>צלם ושלח</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Rubik:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Heebo', sans-serif; background: #0c0a09; color: #fafaf9; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid #292524; max-width: 520px; margin: 0 auto; }
  .logo { width: 44px; height: 44px; border-radius: 12px; background: #22c55e; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .title { font-family: 'Rubik', sans-serif; font-weight: 900; font-size: 22px; }
  .sub { font-size: 13px; color: #a8a29e; }
  main { max-width: 520px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .shoot { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(160deg,#fbbf24,#f59e0b); border: none; border-radius: 20px; padding: 48px 20px; cursor: pointer; color: #0c0a09; box-shadow: 0 8px 30px rgba(245,158,11,0.25); width: 100%; }
  .shoot-txt { font-family: 'Rubik', sans-serif; font-weight: 900; font-size: 22px; }
  .shoot-hint { font-size: 13px; font-weight: 500; opacity: 0.75; }
  /* Live camera */
  .cam-wrap { position: relative; border-radius: 18px; overflow: hidden; border: 1px solid #292524; background: #000; }
  .cam-wrap video { width: 100%; display: block; max-height: 460px; object-fit: cover; }
  .shutter { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); width: 72px; height: 72px; border-radius: 50%; background: #fff; border: 5px solid rgba(255,255,255,0.4); cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .shutter:active { transform: translateX(-50%) scale(0.92); }
  .cam-close { position: absolute; top: 12px; inset-inline-start: 12px; background: rgba(12,10,9,0.7); border: 1px solid #44403c; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); }
  /* Preview */
  .preview-wrap { position: relative; border-radius: 18px; overflow: hidden; border: 1px solid #292524; background: #000; }
  .preview-wrap img { width: 100%; display: block; max-height: 420px; object-fit: contain; }
  .retake { position: absolute; top: 12px; inset-inline-start: 12px; background: rgba(12,10,9,0.7); border: 1px solid #44403c; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .label { font-size: 13px; color: #a8a29e; font-weight: 500; }
  .input { background: #1c1917; border: 1px solid #3f3f46; border-radius: 12px; padding: 13px 14px; color: #fafaf9; font-size: 16px; font-family: 'Heebo', sans-serif; }
  .input:focus { outline: none; border-color: #22c55e; }
  .send { display: flex; align-items: center; justify-content: center; gap: 9px; background: #22c55e; border: none; color: #052e16; border-radius: 14px; padding: 16px; font-size: 18px; font-weight: 800; font-family: 'Rubik', sans-serif; cursor: pointer; width: 100%; }
  .send:disabled { opacity: 0.4; cursor: not-allowed; }
  button:active { transform: scale(0.985); }
  .shutter:active { transform: translateX(-50%) scale(0.92); }
  .status { font-size: 13.5px; color: #fbbf24; text-align: center; line-height: 1.5; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0c0a09" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div>
      <div class="title">צלם ושלח</div>
      <div class="sub">מדבקת פריט ← וואטסאפ לבוס</div>
    </div>
  </div>

  <main>
    <!-- 1. Start button -->
    <button class="shoot" id="shootBtn">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#0c0a09" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
      </svg>
      <span class="shoot-txt">צלם את המדבקה</span>
      <span class="shoot-hint">פתיחת המצלמה</span>
    </button>

    <!-- 2. Live camera -->
    <div class="cam-wrap hidden" id="camWrap">
      <video id="video" playsinline autoplay muted></video>
      <button class="cam-close" id="camClose" title="סגור">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fafaf9" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <button class="shutter" id="shutterBtn" title="צלם"></button>
    </div>

    <!-- 3. Preview -->
    <div class="preview-wrap hidden" id="previewWrap">
      <img id="previewImg" alt="מדבקה">
      <button class="retake" id="retakeBtn" title="צלם שוב">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fafaf9" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>

    <!-- Hidden native-camera fallback -->
    <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden">

    <label class="field">
      <span class="label">מק״ט / הערה (לא חובה)</span>
      <input class="input" id="note" placeholder="לדוגמה: ABC-100 — נגמר כמעט">
    </label>

    <button class="send" id="sendBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#052e16"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.511 5.26l-.999 3.648 3.477-.711z"/></svg>
      שלח בוואטסאפ
    </button>

    <p class="status" id="status"></p>
  </main>

<script>
  const shootBtn = document.getElementById('shootBtn');
  const camWrap = document.getElementById('camWrap');
  const video = document.getElementById('video');
  const shutterBtn = document.getElementById('shutterBtn');
  const camClose = document.getElementById('camClose');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg = document.getElementById('previewImg');
  const retakeBtn = document.getElementById('retakeBtn');
  const fileInput = document.getElementById('fileInput');
  const noteInput = document.getElementById('note');
  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');

  let stream = null;
  let currentFile = null;
  let currentUrl = null;

  function show(el){ el.classList.remove('hidden'); }
  function hide(el){ el.classList.add('hidden'); }

  // ---- Open camera (live), fall back to native camera input ----
  shootBtn.addEventListener('click', startCamera);

  async function startCamera() {
    statusEl.textContent = '';
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      video.srcObject = stream;
      hide(shootBtn); hide(previewWrap); show(camWrap);
    } catch (err) {
      // Live camera blocked (e.g. opened as local file) -> native camera app
      fileInput.click();
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  camClose.addEventListener('click', () => {
    stopCamera(); hide(camWrap); show(shootBtn);
  });

  // ---- Capture frame from live video ----
  shutterBtn.addEventListener('click', () => {
    const w = video.videoWidth, h = video.videoHeight;
    if (!w || !h) return;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    canvas.toBlob((blob) => {
      const file = new File([blob], 'label.jpg', { type: 'image/jpeg' });
      setPhoto(file);
      stopCamera(); hide(camWrap);
    }, 'image/jpeg', 0.9);
  });

  // ---- Native camera / gallery fallback result ----
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) setPhoto(file);
    fileInput.value = '';
  });

  function setPhoto(file) {
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    currentFile = file;
    currentUrl = URL.createObjectURL(file);
    previewImg.src = currentUrl;
    hide(shootBtn); show(previewWrap);
    sendBtn.disabled = false;
  }

  retakeBtn.addEventListener('click', () => {
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    currentFile = null; currentUrl = null;
    hide(previewWrap);
    sendBtn.disabled = true;
    statusEl.textContent = '';
    startCamera();
  });

  function caption() {
    const note = noteInput.value.trim();
    const d = new Date().toLocaleString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    return '🚨 התראת חוסר במלאי\n' + (note ? 'פרטים: ' + note + '\n' : '') + 'נשלח: ' + d;
  }

  // ---- Send to WhatsApp ----
  sendBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    const text = caption();

    // Share sheet WITH the image -> pick WhatsApp -> opens WhatsApp with photo attached
    try {
      if (navigator.canShare && navigator.canShare({ files: [currentFile] })) {
        await navigator.share({ files: [currentFile], text: text, title: 'התראת חוסר במלאי' });
        statusEl.textContent = 'בחר וואטסאפ ואז את הבוס — התמונה כבר מצורפת.';
        return;
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }

    // Fallback (no file-share support): save photo + open WhatsApp (text only)
    try { const a = document.createElement('a'); a.href = currentUrl; a.download = 'label.jpg'; a.click(); } catch(e){}
    window.location.href = 'whatsapp://send?text=' + encodeURIComponent(text);
    setTimeout(() => { window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank'); }, 600);
    statusEl.textContent = 'שמרתי את התמונה ופתחתי וואטסאפ — צרף את התמונה השמורה.';
  });
</script>
</body>
</html>
